<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Settepi - Ruta Colonia Mirasol a San Simón</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --blue-settepi: #00529b; --yellow-settepi: #ffcb05; 
            --blue-light: #e3f2fd; --blue-dark: #0d1b2a;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
        .no-print-panel { 
            background: var(--blue-settepi); color: white; padding: 15px; 
            border-radius: 12px; display: flex; justify-content: space-between;
            margin-bottom: 20px; border-bottom: 5px solid var(--yellow-settepi);
        }
        .report-page { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        #map { height: 500px; width: 100%; border-radius: 12px; margin: 20px 0; border: 1px solid #ccc; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: var(--blue-settepi); color: white; padding: 10px; text-align: left; border-bottom: 3px solid var(--yellow-settepi); }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background: #f9f9f9; }
        .custom-pin {
            background: var(--blue-settepi); width: 24px; height: 24px;
            border-radius: 50% 50% 50% 0; position: absolute; transform: rotate(-45deg);
            border: 2px solid white; display: flex; align-items: center; justify-content: center;
        }
        .custom-pin span { transform: rotate(45deg); color: white; font-weight: bold; font-size: 10px; }
        @media print { .no-print-panel { display: none; } }
    </style>
</head>
<body>

    <div class="no-print-panel">
        <strong>LOGÍSTICA SETTEPI - RUTA SAN SIMÓN</strong>
        <button onclick="window.print()" style="cursor:pointer; padding: 5px 15px; font-weight: bold;">📄 EXPORTAR PDF</button>
    </div>

    <div class="report-page">
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px;">
            <div style="background:var(--blue-light); padding:10px; border-radius:8px;"><b>Ruta:</b><br>Colonia Mirasol - San Simón</div>
            <div style="background:var(--blue-light); padding:10px; border-radius:8px;"><b>Distancia:</b><br>22.18 km</div>
            <div style="background:var(--blue-light); padding:10px; border-radius:8px;"><b>Tiempo:</b><br>1h 28m</div>
            <div style="background:var(--blue-light); padding:10px; border-radius:8px;"><b>Paradas:</b><br>23</div>
        </div>

        <div id="map"></div>

        <table id="report-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Referencia</th>
                    <th>Hora</th>
                    <th>T. Tramo</th>
                    <th>D. Acum</th>
                    <th>Coordenadas</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const puntos = [
            {id:1, name:"COLONIA MIRASOL", h:"05:30 a.m.", tt:"---", da:"0.00 km", lat:30.51156, lon:-115.96154},
            {id:2, name:"PINOS MADRID 2", h:"05:37 a.m.", tt:"7m", da:"1.68 km", lat:30.51557, lon:-115.94462},
            {id:3, name:"ESQUINA CECYTE", h:"05:40 a.m.", tt:"3m", da:"2.35 km", lat:30.51707, lon:-115.93782},
            {id:4, name:"ESQUINA MIGES", h:"05:42 a.m.", tt:"2m", da:"2.60 km", lat:30.51763, lon:-115.93532},
            {id:5, name:"BAHIA DEL ROSARIO", h:"05:43 a.m.", tt:"1m", da:"2.84 km", lat:30.51818, lon:-115.93294},
            {id:6, name:"ESQUINA CHONTAL", h:"05:45 a.m.", tt:"2m", da:"3.08 km", lat:30.51875, lon:-115.93045},
            {id:7, name:"CALLE BALLENAS ESQUINA - CAPILLA JUAN PABLO", h:"05:54 a.m.", tt:"9m", da:"5.35 km", lat:30.50907, lon:-115.90968},
            {id:8, name:"ESQUINA CALLE CALAMAR CASA AZUL", h:"05:56 a.m.", tt:"2m", da:"5.63 km", lat:30.50849, lon:-115.91259},
            {id:9, name:"CALLE DEL ATUN FRENTE CASA VERDE", h:"05:57 a.m.", tt:"1m", da:"5.73 km", lat:30.50828, lon:-115.91357},
            {id:10, name:"CANCHAS FUTBOL", h:"05:58 a.m.", tt:"2m", da:"5.97 km", lat:30.50770, lon:-115.91600},
            {id:11, name:"BALDIO CALLE ELIZABETH MURAL BUDLIGHT", h:"06:02 a.m.", tt:"3m", da:"6.58 km", lat:30.50628, lon:-115.92217},
            {id:12, name:"ESQUINA OXXO FRESERO", h:"06:03 a.m.", tt:"1m", da:"6.82 km", lat:30.50574, lon:-115.92454},
            {id:13, name:"ENTRADA RANCHO SAN SIMON", h:"06:21 a.m.", tt:"18m", da:"17.10 km", lat:30.41640, lon:-115.89700},
            {id:14, name:"BAJADA PERSONAL SKY", h:"06:24 a.m.", tt:"3m", da:"17.39 km", lat:30.41681, lon:-115.89401},
            {id:15, name:"BAJADA PERSONAL SAN SIMON ARÁNDANOS", h:"06:31 a.m.", tt:"7m", da:"18.78 km", lat:30.42810, lon:-115.90039},
            {id:16, name:"BAJADA PERSONAL ARÁNDANOS", h:"06:35 a.m.", tt:"4m", da:"19.06 km", lat:30.42882, lon:-115.89761},
            {id:17, name:"BAJADA PERSONAL COMEDOR MISAEL", h:"06:42 a.m.", tt:"7m", da:"19.88 km", lat:30.42446, lon:-115.90453},
            {id:18, name:"BAJA COMEDOR OLIVER", h:"06:44 a.m.", tt:"2m", da:"20.15 km", lat:30.42218, lon:-115.90378},
            {id:19, name:"BAJADA PERSONAL OFICINA DE YURAWE", h:"06:45 a.m.", tt:"1m", da:"20.31 km", lat:30.42172, lon:-115.90537},
            {id:20, name:"BAJADA COMEDOR BRYAN", h:"06:48 a.m.", tt:"3m", da:"20.87 km", lat:30.42041, lon:-115.91108},
            {id:21, name:"BAJADA COMEDOR NANCY", h:"06:50 a.m.", tt:"2m", da:"21.15 km", lat:30.41976, lon:-115.91390},
            {id:22, name:"BAJADA COMEDOR SANTIAGO", h:"06:53 a.m.", tt:"3m", da:"21.53 km", lat:30.42067, lon:-115.91767},
            {id:23, name:"BAJADA COMEDOR RICARDO RENTERIA", h:"06:58 a.m.", tt:"5m", da:"22.18 km", lat:30.41635, lon:-115.92222}
        ];

        const map = L.map('map').setView([30.45, -115.93], 12);
        L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            subdomains:['mt0','mt1','mt2','mt3'], attribution: 'Google Maps'
        }).addTo(map);

        const tbody = document.getElementById('table-body');
        const coordsParaLinea = [];

        puntos.forEach(p => {
            // Agregar a tabla
            tbody.innerHTML += `<tr>
                <td><b>${p.id}</b></td>
                <td>${p.name}</td>
                <td><b>${p.h}</b></td>
                <td>${p.tt}</td>
                <td>${p.da}</td>
                <td style="color:#888">${p.lat}, ${p.lon}</td>
            </tr>`;

            // Agregar marcador
            const marker = L.marker([p.lat, p.lon], {
                icon: L.divIcon({
                    className: '',
                    html: `<div class="custom-pin"><span>${p.id}</span></div>`,
                    iconAnchor: [12, 24]
                })
            }).addTo(map).bindPopup(`<b>${p.name}</b><br>Hora: ${p.h}`);
            
            coordsParaLinea.push([p.lat, p.lon]);
        });

        // Dibujar ruta
        L.polyline(coordsParaLinea, {color: '#00529b', weight: 4, opacity: 0.7}).addTo(map);
        map.fitBounds(L.polyline(coordsParaLinea).getBounds().pad(0.1));

    </script>
</body>
</html>
